spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER}
    password: ${RABBITMQ_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI}

app:
  color: ${APP_COLOR:STAGING}
  urls:
    public-base-url: ${APP_PUBLIC_BASE_URL}
    frontend-base-url: ${APP_FRONTEND_BASE_URL}
  security:
    jwt:
      enabled: ${JWT_ENABLED:true}
  keycloak:
    enabled: ${KEYCLOAK_ENABLED:true}
    client-id: ${KEYCLOAK_CLIENT_ID:ssafy-maker-prod}
