spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mydatabase}
    username: ${DB_USER:myuser}
    password: ${DB_PASSWORD:secret}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:myuser}
    password: ${RABBITMQ_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: validate
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER_URI:http://localhost:8081/realms/app}
  docker:
    compose:
      enabled: false

app:
  color: ${APP_COLOR:LOCAL}
  urls:
    public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8080}
    frontend-base-url: ${APP_FRONTEND_BASE_URL:http://localhost:5173}
  security:
    jwt:
      enabled: ${JWT_ENABLED:true}
  keycloak:
    enabled: ${KEYCLOAK_ENABLED:true}
