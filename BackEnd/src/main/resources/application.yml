spring:
  application:
    name: game-infra-test
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  color: ${APP_COLOR:UNKNOWN}
  security:
    jwt:
      enabled: ${JWT_ENABLED:true}
