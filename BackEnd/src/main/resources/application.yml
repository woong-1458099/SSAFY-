spring:
  application:
    name: game-infra-test
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    open-in-view: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

app:
  color: ${APP_COLOR:UNKNOWN}
  security:
    jwt:
      enabled: ${JWT_ENABLED:true}
  user:
    death-record:
      cooldown: ${USER_DEATH_RECORD_COOLDOWN:3s}
      token-ttl: ${USER_DEATH_RECORD_TOKEN_TTL:30s}
      max-active-tokens: ${USER_DEATH_RECORD_MAX_ACTIVE_TOKENS:5}
      max-failure-attempts: ${USER_DEATH_RECORD_MAX_FAILURE_ATTEMPTS:5}
      failure-lockout: ${USER_DEATH_RECORD_FAILURE_LOCKOUT:30s}
  cache:
    death-dashboard:
      recent-ttl: ${DEATH_DASHBOARD_RECENT_CACHE_TTL:15s}
      ranking-ttl: ${DEATH_DASHBOARD_RANKING_CACHE_TTL:15s}
      dashboard-ttl: ${DEATH_DASHBOARD_CACHE_TTL:15s}
