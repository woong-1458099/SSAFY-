include /etc/nginx/upstreams/active-prod.conf;
include /etc/nginx/upstreams/active-stg.conf;

server {
  listen 80;
  server_name ssafymaker.cloud www.ssafymaker.cloud;

  location /api {
    proxy_pass http://api_upstream_prod;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    root /usr/share/nginx/frontend/prod/live;
    index index.html;
    try_files $uri /index.html;
  }
}

server {
  listen 80;
  server_name stg.ssafymaker.cloud;

  location /api {
    proxy_pass http://api_upstream_stg;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    root /usr/share/nginx/frontend/stg/live;
    index index.html;
    try_files $uri /index.html;
  }
}

server {
  listen 80;
  server_name jenkins.ssafymaker.cloud;

  location / {
    include /etc/nginx/whitelist/active-whitelist.conf;
    proxy_pass http://jenkins:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
  }
}

server {
  listen 80;
  server_name n8n.ssafymaker.cloud;

  location / {
    include /etc/nginx/whitelist/active-whitelist.conf;
    proxy_pass http://n8n:5678;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}

server {
  listen 80;
  server_name auth.ssafymaker.cloud;

  location = /admin {
    include /etc/nginx/whitelist/active-whitelist.conf;
    proxy_pass http://stg-keycloak:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
  }

  location ^~ /admin/ {
    include /etc/nginx/whitelist/active-whitelist.conf;
    proxy_pass http://stg-keycloak:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
  }

  location / {
    proxy_pass http://stg-keycloak:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
  }
}

server {
  listen 443 ssl;
  server_name ssafymaker.cloud www.ssafymaker.cloud;

  ssl_certificate     /etc/nginx/certs/auth-origin.crt;
  ssl_certificate_key /etc/nginx/certs/auth-origin.key;

  location /api {
    proxy_pass http://api_upstream_prod;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    root /usr/share/nginx/frontend/prod/live;
    index index.html;
    try_files $uri /index.html;
  }
}

